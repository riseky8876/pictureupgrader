name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y unzip wget ninja-build

      - name: Download OpenCV Android SDK
        run: |
          cd app/src/main/cpp
          wget -q https://github.com/opencv/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip
          unzip -q opencv-4.6.0-android-sdk.zip
          mv OpenCV-android-sdk opencv-4.6.0-android-sdk

      - name: Download NCNN
        run: |
          cd app/src/main/cpp
          wget -q https://github.com/Tencent/ncnn/releases/download/20230816/ncnn-20230816-android-vulkan.zip
          unzip -q ncnn-20230816-android-vulkan.zip
          mv ncnn-20230816-android-vulkan ncnn-custom-android-vulkan

      - name: Download AI Models into assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p app/src/main/assets/models
          cd app/src/main/assets/models

          REPO="${{ github.repository }}"

          # Auto-detect release tag
          TAG=$(gh release list --repo "$REPO" --limit 10 --json tagName \
                --jq '.[].tagName' | head -5 | while read t; do
            if gh release view "$t" --repo "$REPO" > /dev/null 2>&1; then
              echo "$t"; break
            fi
          done)
          # Fallback: just grab the latest
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --repo "$REPO" --limit 1 --json tagName --jq '.[0].tagName')
          fi
          echo "Using release tag: $TAG"

          gh release download "$TAG" --repo "$REPO" --clobber \
            --pattern "*.bin" --pattern "*.param"

          # SCRFD from nihui
          wget -q --tries=3 \
            "https://github.com/nihui/ncnn-assets/raw/master/models/scrfd_500m-opt2.param" \
            -O scrfd_500m-opt2.param
          wget -q --tries=3 \
            "https://github.com/nihui/ncnn-assets/raw/master/models/scrfd_500m-opt2.bin" \
            -O scrfd_500m-opt2.bin

          echo "=== Model file sizes ==="
          ls -lh
          echo "========================"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
