name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y unzip wget ninja-build

      - name: Download OpenCV Android SDK
        run: |
          cd app/src/main/cpp
          wget -q https://github.com/opencv/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip
          unzip -q opencv-4.6.0-android-sdk.zip
          mv OpenCV-android-sdk opencv-4.6.0-android-sdk

      - name: Download NCNN
        run: |
          cd app/src/main/cpp
          wget -q https://github.com/Tencent/ncnn/releases/download/20230816/ncnn-20230816-android-vulkan.zip
          unzip -q ncnn-20230816-android-vulkan.zip
          mv ncnn-20230816-android-vulkan ncnn-custom-android-vulkan

      # Use gh CLI (pre-installed on GitHub Actions) to download release assets
      # gh handles auth + SSL automatically via GITHUB_TOKEN
      - name: Download AI Models
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p app/src/main/assets/models
          cd app/src/main/assets/models

          # Face detection — from nihui/ncnn-assets (public, use wget)
          echo "Downloading SCRFD..."
          wget -q --tries=3 \
            "https://github.com/nihui/ncnn-assets/raw/master/models/scrfd_500m-opt2.param" \
            -O scrfd_500m-opt2.param
          wget -q --tries=3 \
            "https://github.com/nihui/ncnn-assets/raw/master/models/scrfd_500m-opt2.bin" \
            -O scrfd_500m-opt2.bin

          # Other models — download from your repo's "models" release via gh CLI
          REPO="${{ github.repository }}"
          for f in \
            siggraph17_color_sim.param \
            siggraph17_color_sim.bin \
            encoder.param \
            encoder.bin \
            generator.param \
            generator.bin \
            real_esrgan.param \
            real_esrgan.bin; do
            echo "Downloading $f..."
            gh release download models \
              --repo "$REPO" \
              --pattern "$f" \
              --output "$f" \
              --clobber
          done

          echo ""
          echo "=== Model file sizes ==="
          ls -lh
          echo "========================"

          # Fail build if any critical .bin is suspiciously small
          for f in scrfd_500m-opt2.bin siggraph17_color_sim.bin encoder.bin generator.bin real_esrgan.bin; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -lt 100000 ]; then
              echo "ERROR: $f is too small ($size bytes) — upload may have failed"
              exit 1
            fi
            echo "OK: $f ($size bytes)"
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
