name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y unzip wget ninja-build

      - name: Download OpenCV Android SDK
        run: |
          cd app/src/main/cpp
          wget -q https://github.com/opencv/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip
          unzip -q opencv-4.6.0-android-sdk.zip
          mv OpenCV-android-sdk opencv-4.6.0-android-sdk

      - name: Download NCNN
        run: |
          cd app/src/main/cpp
          wget -q https://github.com/Tencent/ncnn/releases/download/20230816/ncnn-20230816-android-vulkan.zip
          unzip -q ncnn-20230816-android-vulkan.zip
          mv ncnn-20230816-android-vulkan ncnn-custom-android-vulkan

      - name: Download AI Models
        run: |
          mkdir -p app/src/main/assets/models
          cd app/src/main/assets/models

          # Face detection — free from nihui/ncnn-assets
          echo "Downloading SCRFD..."
          wget --retry-connrefused --waitretry=5 --tries=3 -q \
            "https://github.com/nihui/ncnn-assets/raw/master/models/scrfd_500m-opt2.param" \
            -O scrfd_500m-opt2.param
          wget --retry-connrefused --waitretry=5 --tries=3 -q \
            "https://github.com/nihui/ncnn-assets/raw/master/models/scrfd_500m-opt2.bin" \
            -O scrfd_500m-opt2.bin

          # Other models from your own repo release tag "models"
          BASE="https://github.com/${{ github.repository }}/releases/download/models"
          for f in \
            siggraph17_color_sim.param \
            siggraph17_color_sim.bin \
            encoder.param \
            encoder.bin \
            generator.param \
            generator.bin \
            real_esrgan.param \
            real_esrgan.bin; do
            echo "Downloading $f..."
            wget --retry-connrefused --waitretry=5 --tries=3 -q "$BASE/$f" -O "$f"
          done

          echo ""
          echo "=== Model file sizes ==="
          ls -lh
          echo "========================"

          # Verify minimum sizes — crash if any model is suspiciously small
          check_size() {
            local file=$1
            local min_bytes=$2
            local actual
            actual=$(stat -c%s "$file" 2>/dev/null || echo 0)
            if [ "$actual" -lt "$min_bytes" ]; then
              echo "ERROR: $file is too small ($actual bytes, expected >= $min_bytes)"
              exit 1
            fi
            echo "OK: $file ($actual bytes)"
          }

          check_size scrfd_500m-opt2.bin        1000000   # ~4MB
          check_size siggraph17_color_sim.bin   1000000   # ~125MB  
          check_size encoder.bin                1000000   # large
          check_size generator.bin              1000000   # large
          check_size real_esrgan.bin            1000000   # large

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
